<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · DNA Secure Vault</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="center">
    <div class="auth-box card">
      <h1>🧬 DNA Secure Vault</h1>
      <p class="muted">DNA-based cryptography for chemical data</p>
      <div id="alert"></div>
      <label>Username</label>
      <input id="username" autocomplete="username" />
      <label>Password</label>
      <input id="password" type="password" autocomplete="current-password" />
      <button onclick="doLogin()">Sign in</button>
      <button class="ghost" onclick="location.href='/register.html'">Create account</button>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    if (getToken()) location.href = "/dashboard.html";
    async function doLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      try {
        const r = await api("/auth/login", { method: "POST", body: JSON.stringify({ username, password }) });
        setAuth(r.token, r.user);
        location.href = "/dashboard.html";
      } catch (e) {
        const remain = e.data && typeof e.data.remaining === 'number'
          ? ` (${e.data.remaining} attempt${e.data.remaining===1?'':'s'} left)` : '';
        document.getElementById("alert").innerHTML =
          `<div class="alert ${e.status===429?'warn':'error'}">${escapeHTML(e.message)}${remain}</div>`;
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
